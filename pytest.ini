[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    integration: marks tests as integration tests requiring Docker (deselect with '-m "not integration"')
    unit: marks tests as unit tests (no external dependencies)

[coverage:run]
source = app
omit =
    */tests/*
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
