services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db/api_gateway
      - REDIS_URL=redis://redis:6379/0
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-your-api-key-here}
      - LOG_LEVEL=INFO
    depends_on:
      - db
      - redis
    networks:
      - api_network

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: api_gateway
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - api_network

  redis:
    image: redis:7.2
    ports:
      - "6379:6379"
    networks:
      - api_network

volumes:
  postgres_data:

networks:
  api_network:
